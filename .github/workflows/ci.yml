name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (server + client)
        run: npm run typecheck

      - name: Build (client + server)
        run: npm run build
